<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Checkout | KILMORY</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="order-form-card">
        <h2 id="orderTitle">CHECKOUT</h2>
        <form action="index.html" onsubmit="alert('Payment Successful! Returning to home.')">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="Name" required>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Surname" required>
                </div>
            </div>
            <label>Email Address</label>
            <input type="email" placeholder="example@mail.com" required>
            <label>Card Number</label>
            <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" required>
            <div class="form-row">
                <div class="form-group"><label>Expiry</label><input type="text" placeholder="MM/YY" required></div>
                <div class="form-group"><label>CVV</label><input type="password" placeholder="***" required></div>
            </div>
            <label>Task Description</label>
            <textarea placeholder="Tell me about your vibe..."></textarea>
            <button type="submit" class="submit-btn">CONFIRM & PAY</button>
        </form>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        if (type) document.getElementById('orderTitle').innerText = type;
    </script>
</body>
</html>
